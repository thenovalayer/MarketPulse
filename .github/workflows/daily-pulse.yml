name: Daily Market Pulse

on:
  schedule:
    # 32 2 * * 1-5 UTC = 8:02 AM IST, Monday-Friday.
    # GitHub Actions cron is ALWAYS UTC -- adjust the hour/minute if you
    # change timezone assumptions, and remember cron jobs can be delayed
    # by a few minutes on GitHub's shared runners, especially at busy times.
    - cron: "32 2 * * 1-5"
  workflow_dispatch: {}   # lets you click "Run workflow" manually in the Actions tab

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/generate_pulse.py

      - name: Commit and push if changed
        run: |
          git config user.name "market-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html tracker/index.html data/cohort.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Daily market pulse: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
